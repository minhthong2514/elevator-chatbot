<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELEVATOR CHATBOT</title>
    <style>
        :root {
            --bg-color: #0e0e11;
            --user-msg-bg: #282a2d;
            --ai-msg-bg: transparent;
            --text-main: #e3e3e3;
            --accent: #478df5;
            --gradient: linear-gradient(90deg, #478df5, #a26dfa, #f56d8a);
        }

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            max-width: 900px; 
            margin: 0 auto; 
            background: var(--bg-color); 
            color: var(--text-main); 
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            position: relative; /* Quan trọng để logo căn theo body */
        }

        /* PHẦN LOGO GÓC TRÁI */
        .header-logo {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-box {
            width: 35px;
            height: 35px;
            background: var(--gradient);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 14px;
        }

        .logo-text {
            font-size: 14px;
            font-weight: 500;
            color: #888;
            letter-spacing: 0.5px;
        }

        h2 { 
            text-align: center; 
            font-weight: 600;
            letter-spacing: 1px;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text; 
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* Vùng chứa các tin nhắn */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 20px;
            scrollbar-width: thin;
        }

        #chat-container::-webkit-scrollbar { width: 6px; }
        #chat-container::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .message {
            max-width: 90%;
            padding: 12px 18px;
            border-radius: 15px;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .user-message {
            align-self: flex-end;
            background: var(--user-msg-bg);
            color: #fff;
            border-bottom-right-radius: 2px;
        }

        .ai-message {
            align-self: flex-start;
            background: var(--ai-msg-bg);
            border-left: 3px solid var(--accent);
            width: 100%;
            padding-left: 15px;
        }

        .input-area {
            background: #202124;
            border-radius: 28px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            border: 1px solid #333;
        }

        input { 
            flex: 1; 
            padding: 10px 0; 
            border: none; 
            background: transparent; 
            color: white; 
            font-size: 16px; 
            outline: none;
        }

        button { 
            background: var(--accent); 
            color: white; 
            border: none; 
            border-radius: 20px; 
            padding: 8px 20px;
            cursor: pointer; 
            font-weight: bold;
        }

        button:disabled { background: #444; }

        .cursor { 
            display: inline-block; width: 2px; height: 15px; 
            background: var(--accent); margin-left: 2px;
            animation: blink 0.8s infinite; 
        }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header-logo">
        <div class="logo-box">AI</div>
    </div>

    <h2>ELEVATOR CHATBOT</h2>

    <div id="chat-container">
        <div class="message ai-message">Xin chào! Tôi là AI giám sát an ninh. Bạn cần kiểm tra dữ liệu camera lúc nào?</div>
    </div>
    
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Hỏi về sự cố, người ngã, nằm..." onkeypress="if(event.key==='Enter') startStreaming()">
        <button id="sendBtn" onclick="startStreaming()">Gửi</button>
    </div>

    <script>
        async function startStreaming() {
            const input = document.getElementById('userInput');
            const chatContainer = document.getElementById('chat-container');
            const btn = document.getElementById('sendBtn');
            
            if (!input.value.trim()) return;

            const question = input.value;
            
            const userDiv = document.createElement('div');
            userDiv.className = 'message user-message';
            userDiv.textContent = question;
            chatContainer.appendChild(userDiv);
            
            input.value = "";
            input.disabled = true;
            btn.disabled = true;
            chatContainer.scrollTop = chatContainer.scrollHeight;

            const aiDiv = document.createElement('div');
            aiDiv.className = 'message ai-message';
            aiDiv.innerHTML = "<em>Đang trích xuất dữ liệu...</em>";
            chatContainer.appendChild(aiDiv);

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ question: question })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                aiDiv.innerHTML = ""; 

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    aiDiv.innerHTML += chunk;
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }
            } catch (error) {
                aiDiv.innerHTML = "Lỗi kết nối Server.";
            } finally {
                input.disabled = false;
                btn.disabled = false;
                input.focus();
            }
        }
    </script>
</body>
</html>
